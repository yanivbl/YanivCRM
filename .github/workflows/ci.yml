name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Typecheck, lint, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.app.json
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # Runs against a dedicated "yanivcrm-test" Supabase project (not the production
  # project), so repeated CI runs registering real test users don't exhaust the
  # shared email rate limit. VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY point at
  # that test project via repo secrets.
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      # Job logs alone don't show which assertion failed or why - the HTML
      # report (with the trace, screenshots, and network log per failed test)
      # is what's actually needed to diagnose a CI-only failure. Uploaded only
      # on failure so passing runs don't pile up artifacts for no reason.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
